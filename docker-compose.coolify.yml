services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.melodygenerator.fun
    environment:
      - NEXT_PUBLIC_API_URL=https://api.melodygenerator.fun
      - HOSTNAME=0.0.0.0
      - TZ=Australia/Brisbane
    labels:
      - traefik.http.services.http-0-bocgs40gkwwkgwoskw4gckkg-frontend.loadbalancer.server.port=3000
    networks:
      - melodygenerator-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    volumes:
      - "./backend/api/app/output:/usr/src/api/app/output"
      - "/opt/melodygenerator/models:/usr/src/api/app/model:ro"
    labels:
      - traefik.http.services.http-0-bocgs40gkwwkgwoskw4gckkg-api.loadbalancer.server.port=4050
    environment:
      TZ: Australia/Brisbane
      API_URL: https://api.melodygenerator.fun
      APP_URL: https://melodygenerator.fun
      OUTPUT_DIR: /usr/src/api/app/output
      MODEL_DIR: /usr/src/api/app/model
      SOUNDFONT_PATH: /usr/share/sounds/sf2/FluidR3_GM.sf2
      ALLOWED_ORIGINS: https://melodygenerator.fun
      DEBUG: "false"
      LOGGING_LEVEL: INFO
      PG_DB_HOST: postgres
      PG_DB_PORT: "5432"
      PG_DB_MIN_CONNECTIONS: "10"
      PG_DB_MAX_CONNECTIONS: "100"
      PG_DB_COMMAND_TIMEOUT: "60"
      PG_DB_MAX_INACTIVE_CONNECTION_LIFETIME: "300"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - melodygenerator-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  postgres:
    image: "postgres:16"
    volumes:
      - "./backend/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro"
      - "postgres-data:/var/lib/postgresql/data"
    environment:
      TZ: Australia/Brisbane
    networks:
      - melodygenerator-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "melodygenerator_user", "-d", "melodygenerator_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

volumes:
  postgres-data: null

networks:
  melodygenerator-net:
    driver: bridge
