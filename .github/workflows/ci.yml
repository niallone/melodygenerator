name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu ".[test]"
      - name: Run tests
        env:
          DEBUG: "true"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=30 --timeout=120

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run linter
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Run linter
        run: npm run lint

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test -- --run
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/api/Dockerfile .
      - name: Build frontend image
        run: docker build ./frontend

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-tests, backend-lint, frontend-lint, frontend-tests, docker-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 178.104.38.45
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/melodygenerator/repo
            git fetch origin main
            git reset --hard origin/main

            cd /opt/melodygenerator/prod
            docker compose build
            docker compose up -d

            # Health checks with polling
            echo "Waiting for services..."
            for i in $(seq 1 30); do
              docker exec mg-api curl -sf http://localhost:4050/health && break
              [ $i -eq 30 ] && echo "API health check failed" && exit 1
              sleep 2
            done
            for i in $(seq 1 30); do
              docker exec mg-frontend wget --spider -q http://127.0.0.1:3000 && break
              [ $i -eq 30 ] && echo "Frontend health check failed" && exit 1
              sleep 2
            done
            echo "Deploy successful!"