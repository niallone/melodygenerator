name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu ".[test]"
      - name: Run tests
        env:
          DEBUG: "true"
          SECRET_KEY: "test-secret-key-for-ci-pipeline-use"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --cov=app --cov-report=term-missing --timeout=120

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run linter
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Run linter
        run: npm run lint

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test -- --run
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f backend/api/Dockerfile .
      - name: Build frontend image
        run: docker build ./frontend

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-tests, backend-lint, frontend-lint, frontend-tests, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -f -X POST "https://foundry.niall.one/api/v1/applications/bocgs40gkwwkgwoskw4gckkg/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_KEY }}" \
            --max-time 30
